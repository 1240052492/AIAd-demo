# ============================================================
# AdCraft Web — 生产 Nginx 配置（SPA 静态托管 + API/WS 反向代理）
#
# 说明：TLS 应在外部负载均衡（LB）/ 带证书的 nginx 处终止。
#       本容器仅处理 HTTP；若前置 LB 已做 HTTPS 卸载，下面的
#       proxy_set_header X-Forwarded-Proto $scheme 会把真实协议往下传。
#       如需在本容器终止 TLS，可再监听 443 并配置 ssl_certificate。
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- gzip 压缩 ----------
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ---------- 带 contenthash 的静态资源：长缓存 ----------
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- WebSocket 代理到 server:4177 ----------
    # BullMQ / 实时进度等可能使用 /ws；必须透传 Upgrade/Connection 头。
    location /ws {
        proxy_pass http://server:4177;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 长连接（生图轮询/WS）不要被 nginx 提前断开
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- REST API 代理到 server:4177 ----------
    location /api {
        proxy_pass http://server:4177;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---------- SPA fallback ----------
    # 未匹配到的前端路由统一回退到 index.html（前端使用 History 路由）
    location / {
        try_files $uri $uri/ /index.html;
    }
}
