# 说明：本机 Docker Hub 被墙，postgres/redis 已改用 DaoCloud 镜像加速
#   （docker.m.daocloud.io/library/*）。同理，apps/server 与 apps/web 的
#   Dockerfile 内 node:20-alpine / nginx:alpine 也使用 DaoCloud 镜像。
#   若你的环境可直连 Docker Hub，可把下方镜像名换回官方镜像。
#
# 构建上下文统一为仓库根目录（monorepo 需要根 pnpm-workspace.yaml +
# pnpm-lock.yaml），各服务通过 build.dockerfile 指向各自的 Dockerfile。
services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: adcraft-postgres
    environment:
      POSTGRES_DB: ad_ai
      POSTGRES_USER: ad_ai
      POSTGRES_PASSWORD: ad_ai_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ad_ai -d ad_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - adcraft

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: adcraft-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - adcraft

  # ============================================================
  # AdCraft 后端 API（Express + BullMQ 生产者端 / HTTP 服务）
  # 监听 PORT（默认 4177）。
  # ============================================================
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: adcraft-server
    # 环境变量优先取自 .env；下方 environment 覆盖为容器内可用的值
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4177"
      # 容器内通过服务名访问（覆盖 .env 中的 127.0.0.1）
      DATABASE_URL: postgresql://ad_ai:ad_ai_password@postgres:5432/ad_ai
      REDIS_URL: redis://redis:6379
      OCR_SERVICE_URL: http://ocr-sidecar:4188
    # 仅对内暴露；外部流量经 web(nginx) 的 /api、/ws 代理进来
    expose:
      - "4177"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ocr-sidecar:
        condition: service_started
    networks:
      - adcraft

  # ============================================================
  # AdCraft BullMQ Worker（独立容器，消费 image-generation / composition 队列）
  # 生产必须跑编译产物：worker:prod = `node dist/workers/image.worker.js`。
  #   （旧的 worker:start = `tsx src/...` 依赖 src 源码与 devDependency tsx，
  #    而运行时镜像只含 dist，会启动失败——生产切勿使用。）
  # 真实 worker 入口（编译后）：apps/server/dist/workers/image.worker.js
  # 注：占位包 apps/worker 已中性化（不再启动），不会与本容器抢队列。
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: adcraft-worker
    command: pnpm --filter server worker:prod
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # worker 同样需要 DB（Prisma）与 Redis
      DATABASE_URL: postgresql://ad_ai:ad_ai_password@postgres:5432/ad_ai
      REDIS_URL: redis://redis:6379
      OCR_SERVICE_URL: http://ocr-sidecar:4188
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ocr-sidecar:
        condition: service_started
    networks:
      - adcraft

  # ============================================================
  # OCR Sidecar（FastAPI + PaddleOCR）
  # 仅供 server/worker 内网调用，用于生成图中文字 OCR 校验。
  # ============================================================
  ocr-sidecar:
    build:
      context: .
      dockerfile: ocr-sidecar/Dockerfile
    container_name: adcraft-ocr-sidecar
    environment:
      PADDLE_OCR_LANG: ch
      FLAGS_use_mkldnn: "0"
      FLAGS_use_onednn: "0"
    ports:
      - "127.0.0.1:4188:4188"
    expose:
      - "4188"
    networks:
      - adcraft

  # ============================================================
  # AdCraft 前端（Vite SPA，由 nginx:alpine 托管）
  # nginx.conf 已将 /api、/ws 反向代理到 server:4177。
  # ============================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: adcraft-web
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - adcraft

  # MinIO（可选）：默认 STORAGE_DRIVER=local，本地磁盘存储即可，无需 MinIO。
  # 本机已运行的 lobe-chat 套件占用了 9000/9001 端口，故此处默认注释避免冲突。
  # 如需切换为 S3 存储，请把 .env 中 STORAGE_DRIVER 改为 minio，并取消下面
  # 注释、将端口改为 9060/9061，并在 .env 中同步 MINIO_PORT=9060。
  # minio:
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: minio
  #     MINIO_ROOT_PASSWORD: minio_password
  #   ports:
  #     - "9060:9000"
  #     - "9061:9001"
  #   volumes:
  #     - minio_data:/data
  #   networks:
  #     - adcraft

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  adcraft:
    driver: bridge
